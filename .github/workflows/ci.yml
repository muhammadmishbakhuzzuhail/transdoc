name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - name: Install system libs
        # python-magic needs libmagic; tesseract for the OCR path; script-{latn,grek,cyrl} = the
        # per-script models that read every language of a script far better than the lang packs
        # (greek 2.7→1.5, russian 0.5→0.25, portuguese 3→0.04 CER)
        run: sudo apt-get update && sudo apt-get install -y libmagic1 tesseract-ocr tesseract-ocr-script-latn tesseract-ocr-script-grek tesseract-ocr-script-cyrl

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install package (core + dev + formats + api)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,formats,api]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Test (pytest + coverage)
        # offline only: the suite uses the echo engine, never hits a translation API.
        # Coverage is reported now; a --cov-fail-under ratchet follows once the baseline is observed.
        run: pytest --cov=transdoc --cov-report=term-missing:skip-covered

      - name: Eval regression gate
        # deterministic structure/fidelity metrics over committed digital fixtures vs the
        # saved baseline (echo engine, no OCR/paddle/network). Fails on a metric regression.
        run: python -m transdoc.eval.harness src/transdoc/eval/samples --engine echo --baseline src/transdoc/eval/baseline.json

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (tsc + vite)
        run: npm run build

  docker:
    # Verify the single-image build (multi-stage: React build + python runtime with tesseract /
    # LibreOffice). Build only — no push — so a broken Dockerfile fails CI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: transdoc:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test (import app + CLI help)
        run: |
          docker run --rm transdoc:ci python -c "import transdoc.api.app"
          docker run --rm transdoc:ci transdoc --help

  security:
    # Dependency CVE scan. Non-blocking for now (the heavy ML stack — torch/paddle — carries
    # advisories we don't always control); surfaces findings without gating, ratchet to blocking
    # once the baseline is triaged. Dependabot + CodeQL run on their own schedules.
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: pip-audit (core deps)
        run: |
          python -m pip install --upgrade pip pip-audit
          pip install -e .
          pip-audit --progress-spinner off || true
