name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - name: Install system libs
        # python-magic needs libmagic; tesseract for the OCR path; script-latn = the Latin
        # script model that reads diacritics (ç/ã/é/...) the bare eng pack drops
        run: sudo apt-get update && sudo apt-get install -y libmagic1 tesseract-ocr tesseract-ocr-script-latn

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install package (core + dev + formats + api)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,formats,api]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Test (pytest)
        # offline only: the suite uses the echo engine, never hits a translation API
        run: pytest

      - name: Eval regression gate
        # deterministic structure/fidelity metrics over committed digital fixtures vs the
        # saved baseline (echo engine, no OCR/paddle/network). Fails on a metric regression.
        run: python -m transdoc.eval.harness src/transdoc/eval/samples --engine echo --baseline src/transdoc/eval/baseline.json

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (tsc + vite)
        run: npm run build
