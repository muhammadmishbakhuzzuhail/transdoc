name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install system libs
        # python-magic needs libmagic; tesseract for the OCR path
        run: sudo apt-get update && sudo apt-get install -y libmagic1 tesseract-ocr

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (core + dev + formats)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,formats]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Test (pytest)
        # offline only: the suite uses the echo engine, never hits a translation API
        run: pytest
